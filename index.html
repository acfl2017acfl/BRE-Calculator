<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACFL BRE CALCULATOR</title>

<!-- Stylish Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
}

/* HEADER */
header {
    background: #f5e6d3;
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    font-weight: 600;
    letter-spacing: 1px;
    color: #e85222;
}

header img {
    height: 40px;
}

/* LAYOUT */
.main {
    display: flex;
    height: calc(100vh - 70px);
}

/* LEFT */
.left {
    width: 50%;
    padding: 18px;
    background: #fff;
}

/* RIGHT */
.right {
    width: 50%;
    padding: 18px;
    background: #fff3ef;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* FIELD */
.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    margin-bottom: 3px;
}

/* UNIFORM INPUT */
input, select {
    height: 32px;
    width: 100%;
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid #cde7d8;
    font-size: 13px;
    box-sizing: border-box;
}

/* subtle green focus */
input:focus, select:focus {
    outline: none;
    border-color: #4caf50;
    box-shadow: 0 0 4px rgba(76,175,80,0.3);
}

/* ERROR */
.error {
    font-size: 10px;
    color: red;
}

/* BUTTONS */
.btn {
    margin-top: 12px;
    height: 34px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
}

.calc {
    background: #e85222;
    color: white;
}

.refresh {
    background: #4caf50;
    color: white;
    margin-left: 10px;
}

/* RESULT */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.score {
    font-size: 28px;
    color: #e85222;
    font-weight: bold;
}

table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 12px;
}

th, td {
    border-bottom: 1px solid #ddd;
    padding: 6px;
    text-align: left;
}

th {
    background: #f5f5f5;
}

</style>
</head>

<body>

<header>
    <h2>ACFL BRE Calculator</h2>
    <img src="ACFL Logo PNG WhiteBG.png">
</header>

<div class="main">

<!-- LEFT -->
<div class="left">

<div class="grid">

<div class="field">
<label>Client Name</label>
<input id="name">
</div>

<div class="field">
<label>Loan ID</label>
<input id="loan">
</div>

<div class="field">
<label>Residential Stability</label>
<select id="res">
<option value="SELF">Self Owned</option>
<option value="FAMILY">Family Owned</option>
<option value="RENT">Rented</option>
</select>
</div>

<div class="field">
<label>Business Premise</label>
<select id="premise">
<option value="OWNED">Owned</option>
<option value="RENTED">Rented</option>
</select>
</div>

<div class="field">
<label>Premise Premise Years</label>
<input type="number" id="py">
<div class="error" id="e1"></div>
</div>

<div class="field">
<label>Co-Borrower Co-Residense</label>
<select id="co">
<option value="YES">Same Household</option>
<option value="NO">Out of Station</option>
</select>
</div>

<div class="field">
<label> Business Vintage</label>
<input type="number" id="v">
<div class="error" id="e2"></div>
</div>

<div class="field">
<label> Business Sector Risk</label>
<select id="sector">
<option value="LOW">Low</option>
<option value="MEDIUM">Medium</option>
<option value="HIGH">High</option>
</select>
</div>

<div class="field">
<label>Household Expense</label>
<input type="number" id="exp">
</div>

<div class="field">
<label>Household Income</label>
<input type="number" id="inc">
<div class="error" id="e3"></div>
</div>

<div class="field">
<label>Current EMI</label>
<input type="number" id="emi">
</div>

<div class="field">
<label>Credit Bureau Score</label>
<input type="number" id="bur">
<div class="error" id="e4"></div>
</div>

</div>

<button class="btn calc" onclick="calc()">Calculate</button>
<button class="btn refresh" onclick="location.reload()">Refresh</button>

</div>

<!-- RIGHT -->
<div class="right">

<div class="card" id="out">

<div class="score">--</div>
<div>Client Name: --</div>
<div>Loan ID: --</div>
<div>Risk Category: --</div>
<div>Decision: --</div>
<div>Interest Rate: --</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted Score</th></tr>
<tbody id="table"></tbody>
</table>

</div>

</div>

</div>

<script>

function validate(){
let py=pyv.value,v=vv.value,inc=incv.value,bur=burv.value;
e1.innerText=e2.innerText=e3.innerText=e4.innerText="";

let ok=true;

if(py<0||py>100){e1.innerText="0-100";ok=false;}
if(v<0||v>100){e2.innerText="0-100";ok=false;}
if(inc<=0){e3.innerText=">0";ok=false;}
if(!((bur>=300&&bur<=900)||(bur>=-1&&bur<=6))){e4.innerText="300-900 or NTC";ok=false;}

return ok;
}

function calc(){

if(!validate()) return;

let name = document.getElementById("name").value;
let loan = document.getElementById("loan").value;
let res=resv.value,prem=premv.value,py=+pyv.value,co=cov.value;
let v=+vv.value,sec=secv.value,exp=+expv.value,inc=+incv.value;
let emi=+emiv.value,bur=+burv.value;

// scoring
let resS=(res=="SELF"||res=="FAMILY")?10:0;
let premS=prem=="OWNED"?10:(py>=4?5:py>=3?4:py>=2?3:py>=1?1:0);
let coS=co=="YES"?10:0;
let vS=v>=4?10:v>=3?8:v>=2?5:v>=1?3:0;
let secS=sec=="LOW"?10:sec=="MEDIUM"?5:0;

let ratio=(exp/inc)*100;
let expS=ratio<30?10:ratio<35?8:ratio<40?5:ratio<=50?3:0;

let foir=(emi/inc)*100;
let foirS=foir<=10?10:foir<=20?8:foir<=30?6:foir<=40?4:foir<=50?2:0;

let burS=bur>=800?10:bur>=785?9.5:bur>=770?9:bur>=755?8.5:
bur>=740?8:bur>=725?7.5:bur>=710?7:bur>=695?6.5:
bur>=680?6:bur>=665?5.5:bur>=650?5:2;

let final=(resS*.10+premS*.05+coS*.05+vS*.05+secS*.05+expS*.05+foirS*.25+burS*.40)*10;

let risk,rate,dec;

if(final>=70){risk="LOW";rate="27%";dec="APPROVED";}
else if(final>=50){risk="MID";rate="27.5%";dec="APPROVED";}
else if(final>=40){risk="HIGH";rate="28.5%";dec="APPROVED";}
else{risk="VERY HIGH";rate="-";dec="REJECTED";}

// output
out.innerHTML=`
<div class="score">${final.toFixed(1)}</div>
<div><b>Client Name:</b> ${name}</div>
<div><b>Loan ID:</b> ${loan}</div>
<div><b>Risk:</b> ${risk}</div>
<div><b>Decision:</b> ${dec}</div>
<div><b>Interest Rate:</b> ${rate}</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted Score</th></tr>
${row("Residential Score",resS,1.0)}
${row("Business Premise Score",premS,0.5)}
${row("CoBorrower CoResidense",coS,0.5)}
${row("Vintage Score",vS,0.5)}
${row("Sector Score",secS,0.5)}
${row("IncomeExpense Ratio",expS,0.5)}
${row("FOIR Score",foirS,2.5)}
${row("CB Score",burS,4.0)}
</table>
`;

}

function row(n,s,w){
return `<tr><td>${n}</td><td>${s}</td><td>${w*100}%</td><td>${(s*w).toFixed(2)}</td></tr>`;
}

// shortcuts


</script>

</body>
</html>
