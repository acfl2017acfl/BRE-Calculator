<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    font-family: "Book Antiqua", serif;
    margin: 0;
    background: #f4f6f9;
}

/* HEADER */
header {
    background: #f5e6d3;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    color: #e85222;
    font-weight: bold;
}

header img {
    height: 40px;
}

/* LAYOUT */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* CARDS */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    height: calc(100% - 30px);
}

/* LEFT RIGHT */
.left { width: 50%; }
.right { width: 50%; background: #fff3ef; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* FIELD */
.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    margin-bottom: 3px;
}

/* SAME SIZE INPUT */
input, select {
    height: 34px;
    width: 100%;
    padding: 6px;
    border: 1px solid #b7e1c1;
    border-radius: 6px;
    box-sizing: border-box;
}

/* BUTTONS */
.btn {
    width: 48%;
    height: 42px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    margin-top: 15px;
    cursor: pointer;
}

.calc { background: #4caf50; color: white; }
.refresh { background: #e85222; color: white; }

/* RESULT */
.score {
    font-size: 28px;
    font-weight: bold;
    color: #e85222;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 12px;
}

th, td {
    border-bottom: 1px solid #ddd;
    padding: 6px;
}

th {
    background: #f5f5f5;
}
</style>

</head>

<body>

<header>
    <h2>ACFL BRE Calculator</h2>
    <img src="ACFL Logo PNG WhiteBG.png">
</header>

<div class="main">

<!-- INPUT -->
<div class="left">
<div class="card">

<div class="grid">

<div class="field"><label>Client Name</label><input id="name"></div>
<div class="field"><label>Loan ID</label><input id="loan"></div>

<div class="field"><label>Residential Stability</label>
<select id="res"><option>SELF</option><option>FAMILY</option><option>RENT</option></select>
</div>

<div class="field"><label>Business Premise Stability</label>
<select id="premise"><option>OWNED</option><option>RENTED</option></select>
</div>

<div class="field"><label>Years in Business Premise</label>
<input type="number" id="py"></div>

<div class="field"><label>Co-Borrower Co-residence</label>
<select id="co"><option value="YES">Same Household</option><option value="NO">Out of Station</option></select>
</div>

<div class="field"><label>Business Vintage</label>
<input type="number" id="v"></div>

<div class="field"><label>Business Sector Risk</label>
<select id="sec"><option>LOW</option><option>MEDIUM</option><option>HIGH</option></select>
</div>

<div class="field"><label>Total Household Expense</label>
<input type="number" id="exp"></div>

<div class="field"><label>Household Income</label>
<input type="number" id="inc"></div>

<div class="field"><label>Current EMI Obligation</label>
<input type="number" id="emi"></div>

<div class="field"><label>Credit Bureau Score</label>
<input type="number" id="bur"></div>

</div>

<button class="btn calc" onclick="calc()">Calculate</button>
<button class="btn refresh" onclick="location.reload()">Refresh</button>

</div>
</div>

<!-- OUTPUT -->
<div class="right">
<div class="card" id="out">

<div class="score">--</div>
<div><b>Client Name:</b> --</div>
<div><b>Loan ID:</b> --</div>
<div><b>Risk:</b> --</div>
<div><b>Decision:</b> --</div>
<div><b>Interest Rate:</b> --</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted</th></tr>
<tbody id="tbl"></tbody>
</table>

</div>
</div>

</div>

<script>

function calc(){

let name=namev.value,loan=loanv.value;
let res=resv.value,prem=premise.value,py=+pyv.value,co=cov.value;
let v=+vv.value,sec=secv.value,exp=+expv.value,inc=+incv.value;
let emi=+emiv.value,bur=+burv.value;

// scoring
let resS=(res=="SELF"||res=="FAMILY")?10:0;
let premS=prem=="OWNED"?10:(py>=4?5:py>=3?4:py>=2?3:py>=1?1:0);
let coS=co=="YES"?10:0;
let vS=v>=4?10:v>=3?8:v>=2?5:v>=1?3:0;
let secS=sec=="LOW"?10:sec=="MEDIUM"?5:0;

let ratio=(exp/inc)*100;
let expS=ratio<30?10:ratio<35?8:ratio<40?5:ratio<=50?3:0;

let foir=(emi/inc)*100;
let foirS=foir<=10?10:foir<=20?8:foir<=30?6:foir<=40?4:foir<=50?2:0;

let burS=bur>=800?10:bur>=785?9.5:bur>=770?9:bur>=755?8.5:
bur>=740?8:bur>=725?7.5:bur>=710?7:bur>=695?6.5:
bur>=680?6:bur>=665?5.5:bur>=650?5:2;

let final=(resS*.10+premS*.05+coS*.05+vS*.05+secS*.05+expS*.05+foirS*.25+burS*.40)*10;

let risk,rate,dec;
if(final>=70){risk="LOW";rate="27%";dec="APPROVED";}
else if(final>=50){risk="MID";rate="27.5%";dec="APPROVED";}
else if(final>=40){risk="HIGH";rate="28.5%";dec="APPROVED";}
else{risk="VERY HIGH";rate="-";dec="REJECTED";}

out.innerHTML=`
<div class="score">Risk Score: ${final.toFixed(1)}</div>
<div><b>Client Name:</b> ${name}</div>
<div><b>Loan ID:</b> ${loan}</div>
<div><b>Risk:</b> ${risk}</div>
<div><b>Decision:</b> ${dec}</div>
<div><b>Interest Rate:</b> ${rate}</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted</th></tr>
${row("Residential Stability",resS,0.10)}
${row("Business Premise Stability",premS,0.05)}
${row("Co-Borrower Co-residence",coS,0.05)}
${row("Business Vintage",vS,0.05)}
${row("Business Sector Risk",secS,0.05)}
${row("Expense Ratio",expS,0.05)}
${row("FOIR",foirS,0.25)}
${row("Credit Bureau Score",burS,0.40)}
</table>
`;

}

function row(n,s,w){
return `<tr><td>${n}</td><td>${s}</td><td>${w*100}%</td><td>${(s*w).toFixed(2)}</td></tr>`;
}

let namev=name,loanv=loan,resv=res,premise=premise,pyv=py,cov=co,
vv=v,secv=sec,expv=exp,incv=inc,emiv=emi,burv=bur;

</script>

</body>
</html>
