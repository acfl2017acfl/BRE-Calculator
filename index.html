<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    font-family: "Book Antiqua", serif;
    background: #f4f6f9;
}

/* HEADER */
header {
    background: #f5e6d3;
    text-align: center;
    padding: 12px;
    font-size: 22px;
    font-weight: bold;
    color: #e85222;
}

/* LAYOUT */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* CARD */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    height: calc(100% - 30px);
}

.left { width: 50%; }
.right { width: 50%; background: #fff3ef; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

label { font-size: 12px; }

input, select {
    width: 100%;
    height: 36px;
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #b7e1c1;
}

/* BUTTON */
.btn {
    width: 48%;
    height: 50px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-top: 15px;
    cursor: pointer;
}

.calc { background: #4caf50; color: white; }
.refresh { background: #e85222; color: white; }

/* OUTPUT */
.score {
    font-size: 30px;
    font-weight: bold;
    color: #e85222;
}

table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 12px;
}

th, td {
    border-bottom: 1px solid #ddd;
    padding: 6px;
}
</style>

</head>

<body>

<header>ACFL BRE CALCULATOR</header>

<div class="main">

<!-- INPUT -->
<div class="left">
<div class="card">

<div class="grid">

<label>Client Name</label>
<input id="name">

<label>Loan ID</label>
<input id="loan">

<label>Residential Stability</label>
<select id="res">
<option>SELF</option><option>FAMILY</option><option>RENT</option>
</select>

<label>Business Premise Stability</label>
<select id="prem">
<option>OWNED</option><option>RENTED</option>
</select>

<label>Years in Business Premise</label>
<input type="number" id="py">

<label>Co-Borrower Co-residence</label>
<select id="co">
<option value="YES">Same Household</option>
<option value="NO">Out of Station</option>
</select>

<label>Business Vintage</label>
<input type="number" id="v">

<label>Business Sector Risk</label>
<select id="sec">
<option>LOW</option><option>MEDIUM</option><option>HIGH</option>
</select>

<label>Total Household Expense</label>
<input type="number" id="exp">

<label>Household Income</label>
<input type="number" id="inc">

<label>Current EMI Obligation</label>
<input type="number" id="emi">

<label>Credit Bureau Score</label>
<input type="number" id="bur">

</div>

<button class="btn calc" onclick="calculate()">Calculate</button>
<button class="btn refresh" onclick="location.reload()">Refresh</button>

</div>
</div>

<!-- OUTPUT -->
<div class="right">
<div class="card" id="output">

<div class="score">--</div>
<div>Client Name: --</div>
<div>Loan ID: --</div>
<div>Risk: --</div>
<div>Decision: --</div>
<div>Interest Rate: --</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted Score</th></tr>
<tbody></tbody>
</table>

</div>
</div>

</div>

<script>

function calculate(){

let name = document.getElementById("name").value;
let loan = document.getElementById("loan").value;
let res = document.getElementById("res").value;
let prem = document.getElementById("prem").value;
let py = +document.getElementById("py").value;
let co = document.getElementById("co").value;
let v = +document.getElementById("v").value;
let sec = document.getElementById("sec").value;
let exp = +document.getElementById("exp").value;
let inc = +document.getElementById("inc").value;
let emi = +document.getElementById("emi").value;
let bur = +document.getElementById("bur").value;

// scoring
let resS = (res=="SELF"||res=="FAMILY")?10:0;
let premS = prem=="OWNED"?10:(py>=4?5:py>=3?4:py>=2?3:py>=1?1:0);
let coS = co=="YES"?10:0;
let vS = v>=4?10:v>=3?8:v>=2?5:v>=1?3:0;
let secS = sec=="LOW"?10:sec=="MEDIUM"?5:0;

let expRatio = (exp/inc)*100;
let expS = expRatio<30?10:expRatio<35?8:expRatio<40?5:expRatio<=50?3:0;

let foir = (emi/inc)*100;
let foirS = foir<=10?10:foir<=20?8:foir<=30?6:foir<=40?4:foir<=50?2:0;

let burS = bur>=800?10:bur>=785?9.5:bur>=770?9:bur>=755?8.5:
bur>=740?8:bur>=725?7.5:bur>=710?7:bur>=695?6.5:
bur>=680?6:bur>=665?5.5:bur>=650?5:2;

let final = (resS*.10+premS*.05+coS*.05+vS*.05+secS*.05+expS*.05+foirS*.25+burS*.40)*10;

// decision
let risk,rate,dec;
if(final>=70){risk="LOW";rate="27%";dec="APPROVED";}
else if(final>=50){risk="MID";rate="27.5%";dec="APPROVED";}
else if(final>=40){risk="HIGH";rate="28.5%";dec="APPROVED";}
else{risk="VERY HIGH";rate="-";dec="REJECTED";}

// weighted rows (×10 applied)
function row(n,s,w){
return `<tr>
<td>${n}</td>
<td>${s}</td>
<td>${w*100}%</td>
<td>${(s*w*10).toFixed(2)}</td>
</tr>`;
}

// output
document.getElementById("output").innerHTML = `
<div class="score">Risk Score: ${final.toFixed(1)}</div>
<div>Client Name: ${name}</div>
<div>Loan ID: ${loan}</div>
<div>Risk: ${risk}</div>
<div>Decision: ${dec}</div>
<div>Interest Rate: ${rate}</div>

<table>
<tr><th>Parameter</th><th>Score</th><th>Weight</th><th>Weighted Score</th></tr>

${row("Residential Stability",resS,0.10)}
${row("Business Premise Stability",premS,0.05)}
${row("Co-Borrower Co-residence",coS,0.05)}
${row("Business Vintage",vS,0.05)}
${row("Business Sector Risk",secS,0.05)}
${row("Household Expense / Income Ratio",expS,0.05)}
${row("FOIR",foirS,0.25)}
${row("Credit Bureau Score",burS,0.40)}

</table>
`;

}

</script>

</body>
</html>
